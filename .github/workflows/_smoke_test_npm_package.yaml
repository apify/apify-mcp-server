name: Smoke test npm package

on:
    workflow_call:
        inputs:
            version:
                description: Exact version to install (e.g. "1.2.3"). If empty, resolves from npm_tag.
                required: false
                type: string
                default: ""
            npm_tag:
                description: NPM dist-tag to install (e.g. "beta", "latest"). Used when version is empty.
                required: false
                type: string
                default: latest

jobs:
    smoke_test:
        name: Smoke test published package
        runs-on: ubuntu-latest
        steps:
            -   name: Use Node.js
                uses: actions/setup-node@v6
                with:
                    node-version: 22

            -   name: Install published package
                uses: nick-fields/retry@v3
                with:
                    timeout_minutes: 10
                    max_attempts: 5
                    retry_wait_seconds: 30
                    command: |
                        mkdir -p smoke-test && cd smoke-test
                        npm init -y
                        SPEC="${{ inputs.version && format('@apify/actors-mcp-server@{0}', inputs.version) || format('@apify/actors-mcp-server@{0}', inputs.npm_tag) }}"
                        npm install "$SPEC" @apify/mcpc

            -   name: Verify imports
                working-directory: smoke-test
                run: |
                    node --input-type=module -e "import { ActorsMcpServer } from '@apify/actors-mcp-server'; console.log('OK: library')"
                    node --input-type=module -e "import { HelperTools } from '@apify/actors-mcp-server/internals'; console.log('OK: internals')"

            -   name: Smoke test MCP server via mcpc
                working-directory: smoke-test
                run: |
                    echo '{"mcpServers":{"s":{"command":"node","args":["node_modules/@apify/actors-mcp-server/dist/stdio.js","--tools","docs","--telemetry-enabled","false"]}}}' > .mcp.json
                    npx mcpc --config .mcp.json stdio connect @s
                    npx mcpc @s ping
                    npx mcpc --json @s tools-list | jq -e 'length > 0'
                    npx mcpc --json @s tools-call search-apify-docs query:="web scraping" docSource:="apify" | jq -e '.content[0].text'
                    npx mcpc @s disconnect
