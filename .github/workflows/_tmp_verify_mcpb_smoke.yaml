name: TEMP verify mcpb smoke test

# TEMPORARY — delete before merge. Exercises the real _smoke_test_mcpb.yaml
# on PRs by building/packing the .mcpb the same way build_mcpb does, then
# calling the reusable smoke-test workflow. Lets us confirm the smoke test
# actually runs and passes on a PR (the release workflow is workflow_dispatch
# only, so nothing exercises it otherwise).

on:
    pull_request:
    workflow_dispatch:

jobs:
    build_mcpb:
        name: Build MCPB package
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v6
            -   name: Use Node.js
                uses: actions/setup-node@v6
                with:
                    node-version-file: '.nvmrc'
            -   name: Install pnpm and dependencies
                uses: apify/actions/pnpm-install@v1.1.2
            -   name: Build module
                run: pnpm run build
            -   name: Prepare MCPB package
                run: |
                    pnpm --filter=@apify/actors-mcp-server deploy --prod --node-linker=hoisted mcpb
                    cp -r docs mcpb/docs
                    cp docs/apify-logo-claude-desktop.png mcpb/icon.png
            -   name: Validate MCPB manifest
                run: pnpm dlx @anthropic-ai/mcpb@2.1.2 validate mcpb/manifest.json
            -   name: Create MCPB package
                run: pnpm dlx @anthropic-ai/mcpb@2.1.2 pack mcpb/ apify-mcp-server.mcpb
            -   name: Upload MCPB artifacts
                uses: actions/upload-artifact@v4
                with:
                    name: mcpb-packages
                    path: apify-mcp-server.mcpb

    smoke_test_mcpb:
        name: Smoke test MCPB package
        needs: [build_mcpb]
        uses: ./.github/workflows/_smoke_test_mcpb.yaml
