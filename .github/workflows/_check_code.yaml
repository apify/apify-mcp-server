name: Code checks

on:
  workflow_call:
  workflow_dispatch:

jobs:
    actions_lint_check:
        name: Actions lint check
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout repository
                uses: actions/checkout@v6
            -   name: Run actionlint
                uses: rhysd/actionlint@v1.7.10

    lint_check:
        name: Lint
        runs-on: ubuntu-latest

        steps:
            -   uses: actions/checkout@v6
            -   name: Use Node.js
                uses: actions/setup-node@v6
                with:
                    node-version-file: '.nvmrc'
            -   name: Install pnpm and dependencies
                uses: apify/workflows/pnpm-install@v0.44.0
            -   name: Lint
                run: pnpm run lint

    build:
        name: Build
        runs-on: ubuntu-latest

        steps:
            -   uses: actions/checkout@v6
            -   name: Use Node.js
                uses: actions/setup-node@v6
                with:
                    node-version-file: '.nvmrc'
            -   name: Install pnpm and dependencies
                uses: apify/workflows/pnpm-install@v0.44.0
            -   name: Build
                run: pnpm run build

    test:
        name: Test (Node.js ${{ matrix.node-version }})
        strategy:
            matrix:
                node-version: [22, 24]
            fail-fast: false
        runs-on: ubuntu-latest

        steps:
            -   uses: actions/checkout@v6
            -   name: Use Node.js ${{ matrix.node-version }}
                uses: actions/setup-node@v6
                with:
                    node-version: ${{ matrix.node-version }}
            -   name: Install pnpm and dependencies
                uses: apify/workflows/pnpm-install@v0.44.0
            -   name: Test
                run: pnpm run test

    type_check:
        name: Type check
        runs-on: ubuntu-latest

        steps:
            -   uses: actions/checkout@v6
            -   name: Use Node.js
                uses: actions/setup-node@v6
                with:
                    node-version-file: '.nvmrc'
            -   name: Install pnpm and dependencies
                uses: apify/workflows/pnpm-install@v0.44.0
            -   name: Type checks
                run: pnpm run type-check
