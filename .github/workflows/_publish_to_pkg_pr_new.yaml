on:
    workflow_call:
        inputs:
            ref:
                description: Git ref to publish (branch, tag, or commit SHA)
                required: true
                type: string

jobs:
    push_pkg_pr_new:
        name: Push to pkg.pr.new
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout repository
                uses: actions/checkout@v6
                with:
                    ref: ${{ inputs.ref }}

            -   name: Use Node.js
                uses: actions/setup-node@v6
                with:
                    node-version-file: '.nvmrc'

            -   name: Install pnpm and dependencies
                uses: apify/workflows/pnpm-install@v0.44.0

            -   name: Build
                run: pnpm run build

            -   run: npx -y pkg-pr-new publish
