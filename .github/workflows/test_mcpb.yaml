name: "TEMP: Test MCPB build"
# TODO: Delete this workflow once the MCPB build is verified working

on:
    pull_request:

jobs:
    build_mcpb:
        name: Build MCPB package
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v6
            -   name: Use Node.js
                uses: actions/setup-node@v6
                with:
                    node-version-file: '.nvmrc'
                    cache: 'npm'
                    cache-dependency-path: 'package-lock.json'
            -   name: Install dependencies
                run: npm ci --force
            -   name: Build web widgets
                working-directory: src/web
                run: |
                    npm ci
                    npm run build
            -   name: Build module
                run: npm run build
            -   name: Prepare MCPB package
                run: |
                    npm prune --omit=dev
                    mkdir mcpb
                    cp -r node_modules mcpb/node_modules
                    cp -r dist mcpb/dist
                    cp -r docs mcpb/docs
                    cp package.json mcpb/package.json
                    cp manifest.json mcpb/manifest.json
                    cp docs/apify-logo-claude-desktop.png mcpb/apify-logo.png
            -   name: Validate MCPB manifest
                run: npx -y @anthropic-ai/mcpb@2.1.2 validate mcpb/manifest.json
            -   name: Create MCPB package
                run: npx -y @anthropic-ai/mcpb@2.1.2 pack mcpb/ apify-mcp-server.mcpb
            -   name: Upload MCPB artifact
                uses: actions/upload-artifact@v4
                with:
                    name: mcpb-packages
                    path: apify-mcp-server.mcpb
